    <line x1="20" y1="165" x2="70" y2="165" stroke="#8b949e" stroke-width="3"/>
    <rect x="-6" y="94" width="152" height="67" rx="4" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.7"/>
    <circle cx="-6" cy="94" r="3" fill="#58a6ff"/>
